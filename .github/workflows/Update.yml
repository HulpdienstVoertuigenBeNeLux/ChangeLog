name: Update Hulpdiensten

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Setup Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3️⃣ Install dependencies
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run Update.py
      - name: Run Update.py
        run: python -u Scripts/Update.py
        env:
          BRW_URL: ${{ secrets.BRW_URL }}
          AMB_URL: ${{ secrets.AMB_URL }}
          KAZ_URL: ${{ secrets.KAZ_URL }}
          DISCORD: ${{ secrets.DISCORD }}

      # 5️⃣ JSON Syntax check
      - uses: limitusus/json-syntax-check@v1
        with:
          pattern: "\\.json$"

      # 6️⃣ Prettify & Commit
      - name: Prettify and Commit
        run: |
          npm install --no-save prettier@3.8.1
          npx prettier --write "Brandweer.json" "Changelog.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Brandweer.json Changelog.json
          if ! git diff --cached --quiet; then
            git commit -m "Update JSON documents"
            git push origin HEAD:main  # ✅ push via origin, GITHUB_TOKEN is automatisch beschikbaar
          else
            echo "No changes to commit"
          fi
        shell: bash
        env:
          # Gebruik de automatische GitHub token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
