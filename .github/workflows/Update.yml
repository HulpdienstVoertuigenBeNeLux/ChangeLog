name: Update Hulpdiensten

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # 3️⃣ Install dependencies
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run update script
      - name: Run Update.py
        run: python -u Scripts/Update.py
        env:
          BRW_URL: ${{ secrets.BRW_URL }}
          AMB_URL: ${{ secrets.AMB_URL }}
          KAZ_URL: ${{ secrets.KAZ_URL }}
          DISCORD: ${{ secrets.DISCORD }}

      # 5️⃣ Prettify & commit if changes
      - name: Prettify and Push
        run: |
          npm install --no-save prettier@3.8.1
          npx prettier --write "**/*.{js,md,json}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Update Documents"
            git push
          else
            echo "No changes to commit"
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
